appId: com.afghandev.ebadat
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 8000
- extendedWaitUntil:
    visible:
      text: "به عبادت خوش آمدید"
    timeout: 25000
- takeScreenshot: ios-device-first-open-adhan
- tapOn:
    text: "شروع"
- tapOn:
    text: "ادامه"
- extendedWaitUntil:
    visible:
      text: "انتخاب کشور و شهر"
    timeout: 15000
- tapOn:
    text: "کابل"
- tapOn:
    text: "ادامه با کابل"
- extendedWaitUntil:
    visible:
      text: "فعال‌سازی اذان"
    timeout: 15000
- tapOn:
    text: "فعال‌سازی اعلان‌ها"
- tapOn:
    text: "Allow"
    optional: true
- tapOn:
    text: "OK"
    optional: true
- extendedWaitUntil:
    visible:
      id: "naat-screen-list"
    timeout: 40000
- assertNotVisible: "Console Error"
- assertNotVisible: "Console Warning"
- takeScreenshot: ios-device-naat-home

- tapOn:
    point: "75%,94%"
- extendedWaitUntil:
    visible:
      id: "ios-prayer-ready"
    timeout: 15000
- assertNotVisible: "Console Error"
- takeScreenshot: ios-device-prayer

- tapOn:
    point: "42%,94%"
- extendedWaitUntil:
    visible:
      id: "ios-articles-ready"
    timeout: 15000
- tapOn:
    id: "ios-article-card"
- extendedWaitUntil:
    visible:
      id: "ios-article-detail-ready"
    timeout: 15000
- assertNotVisible: "Console Error"
- takeScreenshot: ios-device-articles
- tapOn:
    point: "8%,9%"
- extendedWaitUntil:
    visible:
      id: "ios-articles-ready"
    timeout: 15000

- tapOn:
    point: "8%,94%"
- extendedWaitUntil:
    visible:
      id: "ios-more-ready"
    timeout: 15000
- assertNotVisible: "Console Error"
- takeScreenshot: ios-device-more
- tapOn:
    id: "ios-open-ahadith"
- extendedWaitUntil:
    visible:
      id: "ios-ahadith-ready"
    timeout: 15000
- assertNotVisible: "Console Error"
- takeScreenshot: ios-device-ahadith
- tapOn:
    point: "8%,94%"
- extendedWaitUntil:
    visible:
      id: "ios-more-ready"
    timeout: 15000

- tapOn:
    point: "25%,94%"
- extendedWaitUntil:
    visible:
      id: "naat-screen-list"
    timeout: 20000
- tapOn:
    id: "naat-card-play-button"
- extendedWaitUntil:
    visible:
      id: "naat-player-dock"
    timeout: 60000
- assertNotVisible: "Console Error"
- takeScreenshot: ios-device-naat-playing
- tapOn:
    id: "naat-player-next-button"
    optional: true
- tapOn:
    id: "naat-player-previous-button"
    optional: true
- tapOn:
    id: "naat-player-toggle-button"
- tapOn:
    id: "naat-player-toggle-button"
- pressKey: Home
- waitForAnimationToEnd:
    timeout: 6000
- launchApp
- extendedWaitUntil:
    visible:
      id: "naat-player-dock"
    timeout: 15000
- assertNotVisible: "Console Error"
- tapOn:
    id: "naat-downloads-button"
- extendedWaitUntil:
    visible:
      id: "ios-naat-downloads-ready"
    timeout: 15000
- takeScreenshot: ios-device-downloads
- tapOn:
    point: "8%,9%"

- tapOn:
    point: "8%,94%"
- extendedWaitUntil:
    visible:
      id: "ios-more-ready"
    timeout: 15000
- tapOn:
    id: "ios-open-adhan-settings"
- extendedWaitUntil:
    visible:
      id: "ios-adhan-settings-ready"
    timeout: 15000
- tapOn:
    id: "adhan-system-test-button"
- tapOn:
    text: "Allow"
    optional: true
- tapOn:
    text: "OK"
    optional: true
- waitForAnimationToEnd:
    timeout: 30000
- assertNotVisible: "Console Error"
- assertNotVisible: "Console Warning"
- takeScreenshot: ios-device-adhan-test
